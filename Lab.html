<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>المعمل - مركز الخليل الطبي</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap');
    @import url('https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css');

    :root {
      --primary-color: #5f27cd;
      --secondary-color: #4834d4;
      --accent-color: #ff9f43;
      --light-color: #ffffff;
      --dark-color: #222f3e;
      --gray-bg: #f7f9fc;
      --border-color: #dcdde1;
    }

    * { 
      box-sizing: border-box; 
      transition: all 0.3s ease;
    }

    body {
      font-family: 'Cairo', sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      color: var(--dark-color);
      min-height: 100vh;
      margin: 0;
      display: flex;
      flex-direction: column;
    }

    header {
      background: var(--light-color);
      padding: 15px 0;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .header-content { 
      max-width: 1200px; 
      margin: 0 auto; 
      padding: 0 20px; 
      display: flex; 
      align-items: center; 
      justify-content: space-between; 
      flex-wrap: wrap;
      gap: 15px;
    }

    .logo-text h1 { margin: 0; color: var(--primary-color); font-size: 1.6rem; font-weight: 700; }
    
    nav { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
    
    nav a.nav-link {
      background: var(--gray-bg);
      color: var(--primary-color);
      padding: 8px 18px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.9rem;
      border: 1px solid transparent;
    }
    
    nav a.nav-link:hover { background: var(--primary-color); color: white; }
    nav a.nav-link.active { background: var(--primary-color); color: white; }

    .hero { text-align:center; padding: 40px 20px; }
    .hero h2 { margin: 0; color: var(--primary-color); }

    /* تنسيق أزرار التبديل (Tabs) */
    .view-tabs {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }

    .view-tab {
      background: var(--light-color);
      border: 2px solid var(--primary-color);
      color: var(--primary-color);
      padding: 12px 25px;
      border-radius: 50px;
      cursor: pointer;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1rem;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }

    .view-tab.active {
      background: var(--primary-color);
      color: white;
    }

    .offers-view {
      display: none;
      animation: fadeIn 0.5s ease-in-out;
      text-align: center;
    }

    .offer-card {
      position: relative;
      display: inline-block;
      width: 100%;
      max-width: 800px;
      margin-bottom: 30px;
      cursor: pointer;
    }

    .offer-large-img {
      width: 100%;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      border: 6px solid white;
      transition: transform 0.3s ease;
      display: block;
    }

    /* شارة الخصم فوق الصورة */
    .discount-badge {
      position: absolute;
      top: -15px;
      right: -15px;
      background: var(--accent-color);
      color: white;
      width: 75px;
      height: 75px;
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      box-shadow: 0 5px 20px rgba(255, 159, 67, 0.5);
      z-index: 10;
      border: 3px solid white;
      animation: pulse 2s infinite;
    }
    
    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    .offer-large-img:hover {
      transform: scale(1.02);
    }

    main { 
      max-width: 900px; 
      margin: 0 auto 40px auto; 
      padding: 0 20px; 
      flex: 1;
    }
    .section-title { text-align:right; margin-bottom: 18px; }

    .tests-container { 
      background: var(--light-color); 
      padding: 25px; 
      border-radius: 15px; 
      box-shadow: 0 10px 30px rgba(0,0,0,0.08); 
    }

    .tests-search { display: flex; gap: 10px; margin-bottom: 20px; }
    .tests-search input { 
      flex: 1; 
      padding: 12px 18px; 
      border: 2px solid var(--gray-bg); 
      border-radius: 10px; 
      outline: none;
      font-family: inherit;
    }
    .tests-search input:focus { border-color: var(--primary-color); }
    .tests-search button { 
      background: var(--primary-color); 
      color: #fff; 
      border: none; 
      padding: 0 20px; 
      border-radius: 10px; 
      cursor: pointer; 
    }
    .tests-search button:hover { background: var(--secondary-color); }

    .tests-list { 
      list-style: none; 
      padding: 0; 
      margin: 0; 
      max-height: 600px; 
      overflow-y: auto; 
      border-radius: 8px;
    }

    /* تحسين شكل شريط التمرير */
    .tests-list::-webkit-scrollbar {
      width: 8px;
    }
    .tests-list::-webkit-scrollbar-track {
      background: var(--gray-bg);
    }
    .tests-list::-webkit-scrollbar-thumb {
      background: var(--secondary-color);
      border-radius: 10px;
    }

    .tests-list li { 
      display: flex; 
      justify-content: space-between; 
      align-items: center;
      padding: 15px; 
      border-bottom: 1px solid var(--gray-bg); 
      background: #fff;
      animation: fadeIn 0.3s ease-in-out;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

    .tests-list li:hover { background: var(--gray-bg); }
    .tests-list li .test-name { font-weight: 600; color: var(--dark-color); }
    .tests-list li .price { 
      background: rgba(95, 39, 205, 0.1); 
      color: var(--primary-color); 
      padding: 5px 12px; 
      border-radius: 20px; 
      font-weight: 700; 
    }

    .no-results { padding:20px; text-align:center; color:#666; }

    footer { 
      background: var(--dark-color); 
      color: white; 
      text-align: center; 
      padding: 25px 0; 
      margin-top: auto; 
    }

    /* Responsive Design Adjustments */
    @media (max-width: 768px) {
      .header-content { flex-direction: column; text-align: center; }
      nav { width: 100%; gap: 8px; }
      nav a.nav-link { flex: 1 1 40%; text-align: center; font-size: 0.8rem; }
      .hero h2 { font-size: 1.6rem; }
      .tests-list li { 
        flex-direction: row; 
        justify-content: space-between; 
        font-size: 0.9rem; 
        padding: 12px; 
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-content">
      <div class="logo-section">
        <div class="logo-text">
          <h1>الخليل الطبي</h1>
          <p style="margin:0; font-size:0.9rem; color:var(--primary-color)">مركز متخصص للعناية الصحية</p>
        </div>
      </div>
      <nav>
        <a class="nav-link" href="index.html">الرئيسية</a>
        <a class="nav-link" href="index.html#specialties">التخصصات</a>
        <a class="nav-link active" href="Lab.html">المعمل</a>
        <a class="nav-link" href="index.html#contact">التواصل</a>
      </nav>
    </div>
  </header>

  <div class="hero">
    <div class="hero-content">
      <h2>قائمة التحاليل والأسعار</h2>
      <p style="color: var(--primary-color); margin-top:8px">استخدم البحث للعثور سريعاً على التحليل المطلوب</p>
    </div>
  </div>

  <main>
    <section class="tests-section">
      <div class="section-title">
        <h2>خدمات المعمل</h2>
      </div>

      <div class="view-tabs">
        <button class="view-tab active" data-view="list">
          <i class="fas fa-list-ol"></i> قائمة الأسعار
        </button>
        <button class="view-tab" data-view="offers">
          <i class="fas fa-percentage"></i> عروض المعمل الكبرى
        </button>
      </div>

      <div id="prices-view">
      <div class="tests-container">
        <div class="tests-search">
          <input type="text" id="tests-search-input" placeholder="ابحث عن اسم التحليل..." aria-label="ابحث عن التحاليل">
          <button id="tests-search-btn"><i class="fa fa-search"></i></button>
        </div>

        <ul id="tests-list" class="tests-list"></ul>
        <div id="tests-no-results" class="no-results" style="display:none">لا توجد نتائج مطابقة</div>
      </div>
      </div>

      <div id="offers-view" class="offers-view">
        <!-- يتم ملء العروض تلقائياً عبر JavaScript -->
      </div>
    </section>
  </main>

  <footer>
    <p>&copy; 2024 مركز الخليل الطبي - جميع الحقوق محفوظة</p>
  </footer>

  <script>
    const testsData = [
      { name: 'Urine - تحليل بول', price: '50 ج' },
      { name: 'Cultures - مزرعة بول', price: '240 ج' },
      { name: 'Alb/Creatinine Ratio in urine - نسبة الالبومين/الكرياتينين في البول', price: '240 ج' },
      { name: 'Stool - تحليل براز', price: '50 ج' },
      { name: 'H.pylori test (جرثومة المعدة)', price: '200 ج' },
      { name: 'Occult blood in stool - دم خفي في البراز', price: '200 ج' },
      { name: 'CBC (صورة دم كاملة)', price: '100 ج' },
      { name: 'HB% (انيميا)', price: '60 ج' },
      { name: 'T.L.C - Total Leukocyte Count', price: '60 ج' },
      { name: 'Platelets - صفائح دموية', price: '60 ج' },
      { name: 'HB Electrophoresis - فصل الهيموجلوبين', price: '540 ج' },
      { name: 'FBS - Fasting Blood Sugar - (سكر صائم)', price: '60 ج' },
      { name: 'PPS - Post Prandial Sugar - (سكر فاطر)', price: '60 ج' },
      { name: 'RBS - Random Blood Sugar - (سكر عشوائي)', price: '60 ج' },
      { name: 'HBA1C - السكر التراكمي', price: '150 ج' },
      { name: 'Homa IR (مقاومة انسولين)', price: '250 ج' },
      { name: 'ASOT (روماتيزم)', price: '100 ج' },
      { name: 'CRP - C-Reactive Protein', price: '100 ج' },
      { name: 'RF - Rheumatoid Factor', price: '100 ج' },
      { name: 'ESR - سرعة الترسيب', price: '100 ج' },
      { name: 'ACCP (Anti-CCP)', price: '420 ج' },
      { name: 'Urea - يوريا (وظائف الكلى)', price: '70 ج' },
      { name: 'Creatinine - (وظائف الكلى) كرياتينين', price: '70 ج' },
      { name: 'Uric Acid - (وظائف الكلى) النقرس', price: '70 ج' },
      { name: 'S.GOT (AST) - وظائف كبد', price: '70 ج' },
      { name: 'S.GPT (ALT) - وظائف كبد', price: '70 ج' },
      { name: 'Albumin - ألبومين', price: '75 ج' },
      { name: 'Bilirubin Direct - بيليروبين مباشر', price: '60 ج' },
      { name: 'Bilirubin Total - بيليروبين كلي', price: '60 ج' },
      { name: 'Total Protein - بروتين كلي', price: '180 ج' },
      { name: 'Cholesterol - كوليسترول', price: '60 ج' },
      { name: 'Triglyceride - دهون ثلاثية', price: '60 ج' },
      { name: 'HDL - كوليسترول جيد', price: '60 ج' },
      { name: 'LDL - كوليسترول سيء', price: '60 ج' },
      { name: 'Lipid Profile - دهون كامل', price: '240 ج' },
      { name: 'PT + INR -(سيولة الدم)', price: '70 ج' },
      { name: 'PTT - (سيولة الدم)', price: '90 ج' },
      { name: 'D-dimer', price: '340 ج' },
      { name: 'Lupus Anticoagulants (LA)', price: '480 ج' },
      { name: 'Bleeding Time', price: '60 ج' },
      { name: 'Clotting Time', price: '60 ج' },
      { name: 'FSH', price: '150 ج' },
      { name: 'PRL - Prolactin (هرمون البن)', price: '150 ج' },
      { name: 'LH', price: '150 ج' },
      { name: 'AMH (مخزون المبيض)', price: '720 ج' },
      { name: 'TSH (الغدة)', price: '120 ج' },
      { name: 'T3 (الغدة)', price: '120 ج' },
      { name: 'T4 (الغدة)', price: '120 ج' },
      { name: 'FT3 (الغدة)', price: '120 ج' },
      { name: 'FT4 (الغدة)', price: '120 ج' },
      { name: 'PTH (الغدة)', price: '300 ج' },
      { name: 'Growth Hormone (هرمون النمو)', price: '300 ج' },
      { name: 'HAV Ab (فيروس اي)', price: '240 ج' },
      { name: 'HBS Ag (فيروس بي)', price: '150 ج' },
      { name: 'HCV Ab (فيروس سي)', price: '150 ج' },
      { name: 'HIV AB (فيروس نقص المناعة)', price: '150 ج' },
      { name: 'Na - صوديوم', price: '100 ج' },
      { name: 'Ph (Phosphate)', price: '100 ج' },
      { name: 'Iron - حديد', price: '110 ج' },
      { name: 'K - بوتاسيوم', price: '100 ج' },
      { name: 'Ca Ionized (كالسيوم ايوني)', price: '100 ج' },
      { name: 'Ca Total (كالسيوم كلي)', price: '100 ج' },
      { name: 'Magnesium (Mg) (ماغنسيوم)', price: '100 ج' },
      { name: 'Alkaline Phosphatase', price: '110 ج' },
      { name: 'Ferritin (مخزون حديد)', price: '150 ج' },
      { name: 'ABO RH (فصيلة دم) ', price: '120 ج' },
      { name: 'Pregnancy Test (اختبار حمل)', price: '60 ج' },
      { name: 'BHCG (حمل رقمي)', price: '240 ج' },
      { name: 'Progesterone (P4)', price: '230 ج' },
      { name: 'Estradiol (E2)', price: '150 ج' },
      { name: 'Testosterone (Free)', price: '220 ج' },
      { name: 'Testosterone (Total)', price: '220 ج' },
      { name: 'Total PSA (بروستاتا)', price: '200 ج' },
      { name: 'Free PSA (بروستاتا)', price: '200 ج' },
      { name: 'AFP', price: '220 ج' },
      { name: 'ANA', price: '360 ج' },
      { name: 'Anti Beta 2 Glycoprotein IgG', price: '720 ج' },
      { name: 'Anti Beta 2 Glycoprotein IgM', price: '720 ج' },
      { name: 'Anti Cardiolipin IgG', price: '480 ج' },
      { name: 'Anti Cardiolipin IgM', price: '480 ج' },
      { name: 'CMV IgG', price: '240 ج' },
      { name: 'CMV IgM', price: '240 ج' },
      { name: 'CPK', price: '120 ج' },
      { name: 'Semen analysis', price: '240 ج' },
      { name: 'Sputum culture', price: '360 ج' },
      { name: 'Toxoplasma IgG', price: '240 ج' },
      { name: 'Toxoplasma IgM', price: '240 ج' },
      { name: 'VIT B12', price: '600 ج' },
      { name: 'DHEA', price: '360 ج' },
      { name: 'DHEA-S', price: '360 ج' },
      { name: 'Drug in urine', price: '490 ج' },
      { name: 'VIT D (فيتامين د)', price: '550 ج' },
      { name: 'TIBC (Total iron binding capacity)', price: '120 ج' },
      { name: 'Serum Transferrin)', price: '360 ج' },
      { name: 'Zinc (Zn ) Serum', price: '360 ج' },

    ];

    // بيانات العروض - سهلة التعديل والإضافة من هنا
    const offersData = [
      {
        img: 'discount.png',
        badgeText: 'خصم',
        badgeIcon: 'fas fa-percentage',
        alt: 'عرض خاص من معمل الخليل'
      },
      {
        img: 'https://via.placeholder.com/800x400/341f97/ffffff?text=خصم+على+تحاليل+السكر',
        badgeText: 'توفير',
        badgeIcon: 'fas fa-fire',
        alt: 'عرض خصم السكر'
      },
      // لإضافة عرض جديد، انسخ الأسطر أعلاه وضعها هنا
    ];

    const testsListEl = document.getElementById('tests-list');
    const testsInput = document.getElementById('tests-search-input');
    const testsNoResults = document.getElementById('tests-no-results');

    function renderTests(list) {
      if (!list || list.length === 0) {
        testsListEl.innerHTML = '';
        testsNoResults.style.display = 'block';
        return;
      }
      testsNoResults.style.display = 'none';
      testsListEl.innerHTML = list.map(t => `
        <li>
          <span class="test-name">${t.name}</span>
          <span class="price">${t.price}</span>
        </li>
      `).join('');
    }

    function renderOffers() {
      const offersView = document.getElementById('offers-view');
      if (offersData.length === 0) {
        offersView.innerHTML = '<p>لا توجد عروض حالياً</p>';
        return;
      }

      const html = offersData.map(offer => `
        <div class="offer-card">
          <div class="discount-badge">
            <i class="${offer.badgeIcon}"></i>
            <span>${offer.badgeText}</span>
          </div>
          <img src="${offer.img}" alt="${offer.alt}" class="offer-large-img">
        </div>
      `).join('');

      offersView.innerHTML = html + `<p style="text-align:center; color:var(--primary-color); font-weight:700">ترقبوا المزيد من العروض قريباً...</p>`;
    }

    // initial render
    renderTests(testsData);
    renderOffers();

    testsInput.addEventListener('input', () => {
      const q = testsInput.value.trim().toLowerCase();
      const filtered = testsData.filter(t => t.name.toLowerCase().includes(q));
      renderTests(filtered);
    });

    document.getElementById('tests-search-btn').addEventListener('click', () => {
      const q = testsInput.value.trim().toLowerCase();
      const filtered = testsData.filter(t => t.name.toLowerCase().includes(q));
      renderTests(filtered);
      testsInput.focus();
    });

    testsInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        document.getElementById('tests-search-btn').click();
      }
    });

    // منطق التبديل بين القائمة والعروض
    const viewTabs = document.querySelectorAll('.view-tab');
    const pricesView = document.getElementById('prices-view');
    const offersView = document.getElementById('offers-view');

    viewTabs.forEach(tab => {
      tab.addEventListener('click', () => {
        viewTabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        
        if (tab.dataset.view === 'list') {
          pricesView.style.display = 'block';
          offersView.style.display = 'none';
        } else {
          pricesView.style.display = 'none';
          offersView.style.display = 'block';
        }
      });
    });
  </script>
</body>
</html>
